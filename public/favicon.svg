<?xml version="1.0" encoding="UTF-8"?>
<!--
  TPC Dashboard favicon — analog dial / gauge motif from the unified
  design system (docs/design-handoff/prototype-icons.jsx
  → DashboardAppIcon).

  Favicons can't read CSS variables, so the colors are sRGB conversions
  of the light-mode design tokens:
    --bg     oklch(0.985 0.003 240)  -> #f9f9fb (tile)
    --ink    oklch(0.22  0.020 255)  -> #1f2532 (dial arc + ticks)
    --accent oklch(0.58  0.13  225)  -> #0089b4 (needle + hub)
    --rule-2 oklch(0.82  0.008 240)  -> #cdd0d6 (tile border)

  Sized at 96 logical units (matches AppIconTile defaults). The 22%
  corner radius matches the iOS/macOS rounded-square tile language.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <rect x="0" y="0" width="96" height="96" rx="21" ry="21" fill="#f9f9fb" stroke="#cdd0d6" stroke-width="1"/>
  <g transform="translate(20.16 20.16) scale(1.16)">
    <path d="M8 32a16 16 0 0 1 32 0" fill="none" stroke="#1f2532" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M10 26l2 1M14 20l1.8 1.5M24 16v2M34 20l-1.8 1.5M38 26l-2 1" fill="none" stroke="#1f2532" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
    <path d="M24 32L31 19" fill="none" stroke="#0089b4" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="24" cy="32" r="2.4" fill="#0089b4"/>
  </g>
</svg>
